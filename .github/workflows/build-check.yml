name: Build check

# On pull requests to main, verify that `npm run build` succeeds in a clean
# environment. Catches build errors (Tailwind config, broken Markdown,
# articles.json out of sync with .md files) before merge — the actual deploy
# happens in the deploy workflow on push to main.

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full build
        run: npm run build
