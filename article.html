<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="robots" content="noindex" />
    <title>Redirecting… – LA Science Fair</title>
    <script>
      // Legacy URL: article.html?id=foo → news/posts/foo.html
      // (kept as a redirect so old shared links and bookmarks keep working)
      (function () {
        var id = new URLSearchParams(location.search).get("id");
        var target = id && /^[A-Za-z0-9_-]+$/.test(id) ? "news/posts/" + id + ".html" : "news.html";
        location.replace(target + location.hash);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=news.html" />
    </noscript>
  </head>
  <body>
    <p>
      Redirecting…
      <noscript>
        If you aren't redirected automatically, <a href="news.html">visit the news index</a>.
      </noscript>
    </p>
  </body>
</html>
