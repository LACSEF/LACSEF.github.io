<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Deadlines &amp; Schedule - LA Science Fair</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Public+Sans:wght@600;700&amp;display=swap"
      rel="stylesheet" />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Tailwind Config from Brand Anchors -->
    <script src="js/components.js"></script>
    <script src="js/schedule.js"></script>
  </head>

  <body class="bg-background text-on-background antialiased min-h-screen flex flex-col">
    <div id="site-header"></div>
    <main
      class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-stack-xl flex flex-col gap-stack-xl">
      <!-- Hero Section -->
      <section class="flex flex-col md:flex-row gap-gutter items-start md:items-center w-full">
        <div class="flex-1 flex flex-col gap-stack-md">
          <h1 class="font-headline-xl text-headline-xl text-primary">Deadlines &amp; Schedule</h1>
          <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">
            Stay on track for the Los Angeles County Science &amp; Engineering Fair. Review all
            critical academic deadlines, safety review periods, and the official fair day itinerary
            below.
          </p>
          <div class="flex gap-stack-md mt-stack-sm">
            <button
              class="bg-primary-container text-on-tertiary font-label-md text-label-md px-stack-lg py-3 rounded flex items-center gap-unit hover:opacity-90 transition-opacity">
              <span class="material-symbols-outlined text-[18px]">calendar_add_on</span>
              Add to Calendar
            </button>
            <button
              class="border border-outline-variant text-primary font-label-md text-label-md px-stack-lg py-3 rounded flex items-center gap-unit hover:bg-surface-variant transition-colors">
              <span class="material-symbols-outlined text-[18px]">download</span>
              PDF Schedule
            </button>
          </div>
        </div>
        <!-- Hero Decorative Image Container -->
        <div
          class="hidden md:block w-1/3 aspect-video bg-surface-container rounded-lg border border-outline-variant overflow-hidden relative">
          <img
            alt="Abstract academic calendar visualization"
            class="w-full h-full object-cover object-center opacity-90 mix-blend-multiply grayscale hover:grayscale-0 transition-all duration-500"
            data-alt="A macro photograph of an intricate brass astrolabe mechanism resting on a pristine white marble desk, illuminated by cool, highly focused studio lighting. The scene employs a strict palette of deep navy blue shadows and crisp white highlights, reflecting an authoritative and intellectual aesthetic. The composition is asymmetrical, leaving generous white space to the right, emphasizing modern academic precision."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDc9zDGh6Tt5oawZMPLBqyaAho-M27tpI0WxaMy73uAqC5dnI_kjQ5s-OYb6cpjJCcFJ_Jz4LmynNfLbS-D8w58FkzY2ZN8K6v_bNLm14MX9ySMdQEEAUmQTYN6HcwX3RmBNij8u9nwOMbroJaj6uemmADJkzeQY_FzmQkDWaJ3ZW0AlYummkh5RWOVlrOzr-_19QbWxVEEy-V2RzS9lc8Zao6r5k2pcCjxYc0PpNMcFldKo1MOMGXs_FZKWJNCcZAAoLMUxco3Kr-I" />
          <div class="absolute inset-0 bg-primary-container/10"></div>
        </div>
      </section>
      <!-- Unified Detailed Timeline -->
      <section
        class="bg-surface border border-outline-variant rounded-lg p-stack-lg flex flex-col gap-stack-lg w-full">
        <div class="flex items-center gap-unit border-b border-outline-variant pb-stack-md">
          <span class="material-symbols-outlined text-primary-container">flag</span>
          <h2 class="font-headline-lg text-headline-md text-primary">Detailed Timeline</h2>
        </div>
        <div
          id="detailed-timeline"
          class="relative pl-8 mt-unit space-y-stack-xl before:absolute before:inset-0 before:ml-[15px] before:h-full before:w-[2px] before:bg-surface-variant"></div>
      </section>
    </main>
    <div id="site-footer"></div>
  </body>
</html>
